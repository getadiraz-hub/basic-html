<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <h1>Employee Interests Survey Form</h1>
    <form>
        <label for="name">Enter your name:</label>
        <input type="text" name="name" id="nm">
        <br><br>

        <label for="dpt">Enter your department:</label>
        <input type="text" name="dpt" id="dpt">
        <br><br>

        <label for="intro">Tell us a little about yourself:</label>
        <textarea name="intro" id="intro" cols="50" rows="10"></textarea>
        <br><br>

        <label>Do you exercise at home?</label>
        <input type="radio" name="exercise" id="yes" value="yes">
        <label for="yes">Yes</label>
        <input type="radio" name="exercise" id="no" value="no">
        <label for="no">No</label>
        <br><br>

        <label>How do you like to read about your favorite topics?</label>
        <input type="checkbox" name="source1" id="source1" value="books">
        <label for="source1">Books</label>
        <input type="checkbox" name="source2" id="source2" value="online_resources">
        <label for="source2">Online resources</label>
        <input type="checkbox" name="source3" id="source3" value="phone_apps">
        <label for="source3">Phone apps</label>
        <input type="checkbox" name="source4" id="source4" value="magazines">
        <label for="source4">Magazines</label>
        <br><br>

        <label for="movie">What genre of movies do you like?</label>
        <select name="movie" id="movie">
            <option value="comedy">Comedy</option>
            <option value="thriller">Thriller</option>
            <option value="action">Action</option>
        </select>
        <br><br>

        <input type="submit" value="Submit form"><br>

    </form>

    <h1>Travel reservation form</h1>
    <form>
        <label>*denotes mandatory</label>
        <br>
        <label for="name">Full name*:</label>
        <br>
        <input type="text" name="fname" id="fname" placeholder="FirstName LastName">
        <br><br>

        <label for="mail">Email address*:</label>
        <br>
        <input type="email" name="mail" id="mail" placeholder="EMAIL_ADDRESS">
        <br><br>

        <label for="tour">Select Tour Package*:</label>
        <br>
        <select name="tour" id="tour">
            <option value="goa">Goa</option>
            <option value="manali">Manali</option>
            <option value="sikkim">Sikkim</option>
        </select>
        <br><br>

        <label for="arr">Arrival date*:</label>
        <br>
        <input type="date" name="arr" id="arr" placeholder="m/d/y">
        <br><br>

        <label for="person">Number of persons*:</label>
        <br>
        <input type="number" name="person" id="person" placeholder="UNKNOWN_TYPE">
        <br><br>

        <label>What would you want to avail?*</label>
        <br>
        <label for="avail1">Boarding</label>
        <input type="checkbox" name="avail1" id="avail1" value="boarding">
        <br>
        <label for="avail2">Fooding</label>
        <input type="checkbox" name="avail2" id="avail2" value="fooding">
        <br>
        <label for="avail3">Sight Seeing</label>
        <input type="checkbox" name="avail3" id="avail3" value="sight_seeing">
        <br><br>

        <label for="coupon">Discount Coupon Code:</label>
        <input type="text" name="coupon" id="coupon" placeholder="UNKNOWN_TYPE">
        <br><br>

        <label>Terms and conditions*</label>
        <br>
        <input type="radio" name="termagree" id="termagree" value="yes">
        <label for="termagree">I agree</label>
        <input type="radio" name="termdisagree" id="termdisagree" value="no">
        <label for="termdisagree">I disagree</label>

        <input type="submit" value="Complete reservation">
    </form>

    <h1>Registration Form</h1>
    <form>
        <label for="fname">First Name:</label>
        <input type="text" name="fname" id="fname" placeholder="Enter First Name">
        <br><br>

        <label for="lname">Last Name:</label>
        <input type="text" name="lname" id="lname" placeholder="Enter Last Name">
        <br><br>

        <label for="mail">Email:</label>
        <input type="email" name="mail" id="mail" placeholder="Enter Email Address">
        <br><br>

        <label for="pwd">Password:</label>
        <input type="password" name="pwd" id="pwd">
        <br><br>

        <label>Gender:</label>
        <br>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="other">Other</label>
        <input type="radio" name="gender" id="other" value="other">
        <br><br>

        <label for="age">Age:</label>
        <input type="number" name="age" id="age" max="60">
        <br><br>

        <label>Preferences:</label>
        <label for="paint1">Acrylic Painting</label>
        <input type="checkbox" name="paint1" id="paint1" value="Acrylic Painting">
        <label for="paint2">Oil Painting</label>
        <input type="checkbox" name="paint2" id="paint2" value="Oil Painting">
        <label for="paint3">Water Color Painting</label>
        <input type="checkbox" name="paint3" id="paint3" value="Water Color Painting">
        <br><br>

        <label for="occupation">Select Occupation</label>
        <select name="occupation" id="occupation">
            <option value="student">Student</option>
            <option value="employee">Employee</option>
            <option value="housewife">Housewife</option>
        </select>
        <br><br>

        <label for="bio">Bio</label>
        <textarea name="bio" cols="50" rows="10" placeholder="Share few lines about yourself..."></textarea>
        <br><br>

        <input type="submit" value="Submit Form">
        <input type="reset" value="Reset Form">
    </form>
</body>

</html>
