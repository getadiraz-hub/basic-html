<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <!-- input type text -->
        <label for="fname">Full Name:</label>
        <input type="text" name="fname" placeholder="Enter your fullname" id="fname">
        <br><br>
        <!--    input type email -->
        <label for="email">Email:</label>
        <input type="email" name="email" placeholder="Enter your email" id="email">
        <br><br>

        <label for="pwd">Password:</label>
        <input type="password" name="pwd" placeholder="Enter your password" id="pwd">
        <br><br>

        <label for="count">Count:</label>
        <input type="number" name="count" id="count" max="10" min="1">
        <br><br>

        <label for="dob">Date of birth:</label>
        <input type="date" name="dob" id="dob">
        <br><br>

        <label for="time">Time</label>
        <input type="time" name="time" id="time">
        <br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>
        <br><br>

        <label>Choice:</label>
        <input type="checkbox" name="choice1" id="choice1" value="choice1">
        <label for="choice1">Choice 1</label>
        <input type="checkbox" name="choice2" id="choice2" value="choice2">
        <label for="choice2">Choice 2</label>
        <input type="checkbox" name="choice3" id="choice3" value="choice3">
        <label for="choice3">Choice 3</label>
        <br><br>

        <label for="pro_img">Profile image:</label>
        <input type="file" name="pro_img" id="pro_img">
        <br><br>

        <label for="documents">Documents:</label>
        <input type="file" name="documents" id="documents" multiple>
        <br><br>

        <label for="color">Color:</label>
        <input type="color" name="color" id="color">
        <br><br>

        <label for="range">Range:</label>
        <input type="range" name="range" id="range" min="1" max="10">
        <br><br>

        <label for="msg">Message:</label>
        <textarea name="msg" id="msg" rows="5" cols="100" placeholder="...Your message"></textarea>\
        <br><br>

        <label for="city">City:</label>
        <select name="city" id="city">
            <optgroup label="north">
                <option value="siliguri">Siliguri</option>
            </optgroup>
            <optgroup label="south">
                <option value="kolkata">Kolkata</option>
                <option value="durgapur">Durgapur</option>
            </optgroup>
        </select>
        <br><br>

        <input type="submit" value="Submit Data">
        <input type="reset" value="Reset Data">
    </form>
</body>

</html>
